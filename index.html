<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gorilla Tag Locomotion VR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
</head>
<body>
<a-scene physics="gravity: -9.8" vr-mode-ui="enabled: true" webxr="optionalFeatures: local-floor">

  <!-- Sky so VR is visible -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="50" height="50" color="#4CAF50" static-body></a-plane>

  <!-- Player body (invisible sphere) -->
  <a-entity id="player" position="0 1.8 0" dynamic-body="shape: sphere; mass: 5">
    <a-camera position="0 0 0"></a-camera>

    <!-- Hands as physics spheres -->
    <a-sphere id="leftHand" radius="0.15" color="blue" dynamic-body="mass:0.5; shape: sphere" oculus-touch-controls="hand: left" physics-hand></a-sphere>
    <a-sphere id="rightHand" radius="0.15" color="red" dynamic-body="mass:0.5; shape: sphere" oculus-touch-controls="hand: right" physics-hand></a-sphere>
  </a-entity>

  <script>
    // Apply forces to player based on hand collisions (GorillaLocomotion style)
    AFRAME.registerComponent('physics-hand', {
      init: function () {
        this.player = document.getElementById('player').body; // physics body
        this.handEl = this.el;
      },
      tick: function () {
        if (!this.player || !this.handEl.body) return;

        // Get hand velocity
        const vel = this.handEl.body.velocity;

        // Only horizontal force
        const forceX = vel.x * 2;
        const forceZ = vel.z * 2;
        const forceY = 0;

        // Apply impulse to player body
        this.player.applyImpulse(
          new CANNON.Vec3(forceX, forceY, forceZ),
          new CANNON.Vec3(0,0,0)
        );
      }
    });
  </script>
</a-scene>
</body>
</html>
