<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gorilla Tag VR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
</head>
<body>
  <a-scene physics="gravity: -9.8" vr-mode-ui="enabled: true">

    <!-- Ground -->
    <a-plane rotation="-90 0 0" width="50" height="50" color="#4CAF50" static-body></a-plane>

    <!-- Player rig -->
    <a-entity id="player" position="0 1.6 0">
      <a-camera id="camera"></a-camera>

      <!-- Hands / controllers -->
      <a-entity id="leftHand" oculus-touch-controls="hand: left" 
                hand-force></a-entity>
      <a-entity id="rightHand" oculus-touch-controls="hand: right" 
                hand-force></a-entity>
    </a-entity>

    <!-- Climbable cubes -->
    <a-box position="2 1 -3" color="red" dynamic-body></a-box>
    <a-box position="-2 1 -5" color="blue" dynamic-body></a-box>
    <a-box position="0 2 -7" color="yellow" dynamic-body></a-box>

    <script>
      // Hand-swing movement component
      AFRAME.registerComponent('hand-force', {
        init: function () {
          this.prevPos = this.el.object3D.position.clone();
        },
        tick: function (time, deltaTime) {
          const dt = deltaTime / 1000;
          const player = document.getElementById('player');
          const cam = document.getElementById('camera').object3D;

          const handPos = this.el.object3D.position.clone();
          const movement = new THREE.Vector3().subVectors(handPos, this.prevPos);

          // Apply hand movement to player horizontal velocity
          player.object3D.position.x += movement.x * 2;
          player.object3D.position.z += movement.z * 2;

          // Apply upward velocity if hands move down quickly
          if (movement.y < -0.02) {
            player.object3D.position.y += Math.abs(movement.y) * 2;
          }

          // Simple gravity
          if (player.object3D.position.y > 1.6) {
            player.object3D.position.y -= 9.8 * dt;
            if (player.object3D.position.y < 1.6) player.object3D.position.y = 1.6;
          }

          this.prevPos.copy(handPos);
        }
      });
    </script>
  </a-scene>
</body>
</html>
