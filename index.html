<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gorilla Tag VR Climbing</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
</head>
<body>
<a-scene physics="gravity: -9.8" vr-mode-ui="enabled: true" webxr="optionalFeatures: local-floor">

  <!-- Sky -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="50" height="50" color="#4CAF50" static-body></a-plane>

  <!-- Climbable walls -->
  <a-box position="0 2 -4" depth="0.2" height="4" width="4" color="brown" static-body class="climbable"></a-box>
  <a-box position="5 2 -2" depth="0.2" height="4" width="4" color="green" static-body class="climbable"></a-box>

  <!-- Player (sphere) -->
  <a-entity id="player" position="0 2 0"
            dynamic-body="shape: sphere; mass: 5; linearDamping: 0.9; angularDamping: 0.9">
    <a-camera id="camera" position="0 0 0"></a-camera>

    <!-- Hands -->
    <a-entity id="leftHand" hand-controls="hand: left; handModelStyle: lowPoly; color: blue"
              physics-hand hand-align></a-entity>
    <a-entity id="rightHand" hand-controls="hand: right; handModelStyle: lowPoly; color: red"
              physics-hand hand-align></a-entity>
  </a-entity>

  <!-- Options menu -->
  <a-entity id="optionsMenu" visible="false" position="0 1.5 -1">
    <a-plane width="0.6" height="0.5" color="#222" opacity="0.9"></a-plane>
    <a-text id="jumpStrengthText" value="Jump Strength: 2" position="-0.25 0.15 0" color="white"></a-text>
    <a-text id="handOffsetText" value="Hand Offset: 0.9" position="-0.25 0.0 0" color="white"></a-text>
    <a-text id="toggleDebugText" value="Debug: Off" position="-0.25 -0.15 0" color="white"></a-text>
  </a-entity>

  <script>
    const settings = { jumpStrength: 2, handOffset: 0.9, debug: false };

    // Auto-calibrate height
    AFRAME.registerComponent('auto-calibrate', {
      init: function () {
        const player = document.getElementById('player');
        const camera = document.getElementById('camera');
        setTimeout(() => {
          const headsetPos = new THREE.Vector3();
          camera.object3D.getWorldPosition(headsetPos);
          player.object3D.position.y = headsetPos.y;
          console.log('Auto-calibrated height:', headsetPos.y.toFixed(2));
        }, 500);
      }
    });

    // GorillaLocomotion physics with climbing
    AFRAME.registerComponent('physics-hand', {
      tick: function () {
        const player = document.getElementById('player').body;
        const hand = this.el.body;
        if (!player || !hand) return;

        const vel = hand.velocity;
        const impulse = new CANNON.Vec3(vel.x*2, 0, vel.z*2);
        player.applyImpulse(impulse, new CANNON.Vec3(0,0,0));

        // Jump / upward push
        if (vel.y < -0.05) {
          const jumpImpulse = new CANNON.Vec3(0, Math.abs(vel.y)*settings.jumpStrength, 0);
          player.applyImpulse(jumpImpulse, new CANNON.Vec3(0,0,0));
        }

        // Climbing: if hand touches a climbable surface, apply additional upward force
        const contacts = hand.world.contacts;
        for (let c of contacts) {
          const other = (c.bi === hand) ? c.bj : c.bi;
          if (other.el && other.el.classList.contains('climbable')) {
            // Add small upward lift proportional to hand velocity
            player.applyImpulse(new CANNON.Vec3(0, Math.abs(vel.y)*0.5, 0), new CANNON.Vec3(0,0,0));
          }
        }
      }
    });

    // Align hands with controller rotation
    AFRAME.registerComponent('hand-align', {
      tick: function () {
        const hc = this.el.components['hand-controls'];
        if (!hc) return;
        const gamepad = hc.controller;
        if (gamepad && this.el.object3D) {
          this.el.object3D.quaternion.copy(gamepad.pose.orientation);
          this.el.object3D.position.y = -settings.handOffset;
        }
      }
    });

    // Options menu toggle via Quest 3 Options button
    const menu = document.getElementById('optionsMenu');
    function checkGamepads() {
      const gps = navigator.getGamepads ? navigator.getGamepads() : [];
      for (let gp of gps) {
        if (!gp) continue;
        if (gp.buttons[3]?.pressed || gp.buttons[4]?.pressed) {
          menu.setAttribute('visible', !menu.getAttribute('visible'));
        }
      }
      requestAnimationFrame(checkGamepads);
    }
    requestAnimationFrame(checkGamepads);

  </script>

  <!-- Activate auto-calibration -->
  <a-entity auto-calibrate></a-entity>

</a-scene>
</body>
</html>
