<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gorilla Tag VR with Height Calibration</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
</head>
<body>
<a-scene physics="gravity: -9.8" vr-mode-ui="enabled: true" webxr="optionalFeatures: local-floor">

  <!-- Sky -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="50" height="50" color="#4CAF50" static-body></a-plane>

  <!-- Climbable cubes -->
  <a-box position="2 1 -3" color="red" dynamic-body></a-box>
  <a-box position="-2 1 -5" color="blue" dynamic-body></a-box>
  <a-box position="0 2 -7" color="yellow" dynamic-body></a-box>

  <!-- Player body (invisible sphere) -->
  <a-entity id="player" position="0 1.8 0" dynamic-body="shape: sphere; mass: 5">
    <a-camera id="camera" position="0 0 0"></a-camera>

    <!-- Quest 3 controllers offset downward -->
    <a-entity id="leftHand" hand-controls="hand: left; handModelStyle: lowPoly; color: blue"
              position="0 -0.9 0"
              physics-hand></a-entity>
    <a-entity id="rightHand" hand-controls="hand: right; handModelStyle: lowPoly; color: red"
              position="0 -0.9 0"
              physics-hand></a-entity>
  </a-entity>

  <!-- Height calibration button -->
  <a-entity id="calibrateButton" 
            geometry="primitive: plane; width: 0.3; height: 0.1" 
            material="color: orange" 
            position="0 1.2 -1"
            text="value: Calibrate Height; align: center; color: black"
            class="clickable"></a-entity>

  <script>
    // Physics-based hand locomotion
    AFRAME.registerComponent('physics-hand', {
      init: function () {
        this.player = document.getElementById('player').body; // player physics body
        this.handEl = this.el;
      },
      tick: function () {
        if (!this.player || !this.handEl.body) return;

        const vel = this.handEl.body.velocity;

        // Horizontal movement
        const forceX = vel.x * 2;
        const forceZ = vel.z * 2;
        this.player.applyImpulse(new CANNON.Vec3(forceX, 0, forceZ), new CANNON.Vec3(0,0,0));

        // Jump boost when hand moves down fast
        if (vel.y < -0.05) {
          this.player.applyImpulse(new CANNON.Vec3(0, Math.abs(vel.y) * 2, 0), new CANNON.Vec3(0,0,0));
        }
      }
    });

    // Height calibration system
    document.querySelector('#calibrateButton').addEventListener('click', function () {
      const player = document.getElementById('player');
      const camera = document.getElementById('camera');

      // Get headset world position
      const headsetPos = new THREE.Vector3();
      camera.object3D.getWorldPosition(headsetPos);

      // Set player Y so hands/ground reach is correct
      const targetY = headsetPos.y; // this is your head height
      player.object3D.position.y = targetY;

      console.log('Height calibrated to:', targetY.toFixed(2), 'meters');
    });
  </script>
</a-scene>
</body>
</html>
