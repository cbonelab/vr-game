<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gorilla Tag VR Physics</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
</head>
<body>
<a-scene physics="gravity: -9.8" vr-mode-ui="enabled: true">

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="50" height="50" color="#4CAF50" static-body></a-plane>

  <!-- Player body -->
  <a-entity id="player" position="0 1.6 0" dynamic-body>
    <a-camera id="camera"></a-camera>

    <!-- Hands -->
    <a-entity id="leftHand" oculus-touch-controls="hand: left" physics-hand></a-entity>
    <a-entity id="rightHand" oculus-touch-controls="hand: right" physics-hand></a-entity>
  </a-entity>

  <!-- Climbable cubes -->
  <a-box position="2 1 -3" color="red" dynamic-body></a-box>
  <a-box position="-2 1 -5" color="blue" dynamic-body></a-box>
  <a-box position="0 2 -7" color="yellow" dynamic-body></a-box>

  <script>
    AFRAME.registerComponent('physics-hand', {
      init: function () {
        this.prevPos = new THREE.Vector3();
        this.el.object3D.getWorldPosition(this.prevPos);
        this.player = document.getElementById('player').object3D;
      },
      tick: function (time, deltaTime) {
        const dt = deltaTime / 1000;
        const handPos = new THREE.Vector3();
        this.el.object3D.getWorldPosition(handPos);

        // Velocity of hand
        const handVel = new THREE.Vector3().subVectors(handPos, this.prevPos).divideScalar(dt);

        // Only horizontal forces for movement
        const force = new THREE.Vector3(handVel.x, 0, handVel.z).multiplyScalar(1.5);

        // Apply force to player
        this.player.position.add(force.multiplyScalar(dt));

        // Simple gravity for player
        if (this.player.position.y > 1.6) {
          this.player.position.y -= 9.8 * dt;
          if (this.player.position.y < 1.6) this.player.position.y = 1.6;
        }

        this.prevPos.copy(handPos);
      }
    });
  </script>
</a-scene>
</body>
</html>
